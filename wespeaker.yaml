wandb:
  api_key: "63ebdc8e7671d691ba101d905edcce9e13a4d80f"
  project: "Speech Quality Assessment" 
  entity: "quangduy-ActableAI"


datasets: # see n_speakers in trainer
  audio_metadata: "/home/duyn/ActableDuy/speech-quality-assessment/metadata.csv"
  sample_rate: 16000 


dataloaders:
  train:  
    num_workers: 4
    batch_size: 8
    shuffle: True
    drop_last: False
    persistent_workers: False
  valid:
    num_workers: 4
    batch_size: 8
    shuffle: False 
    drop_last: False
    persistent_workers: False


model: 
  name: modules.models.Wespeaker34
  args:
    cls_bias: True
    cls_norm: False

optimizer:
  name: torch.optim.Adam
  args:
    lr: 1.0e-5
    weight_decay: 0.0
    betas: [0.9, 0.999]
  

scheduler:
  name: torch.optim.lr_scheduler.ReduceLROnPlateau
  step: True # null to simply call .step()
  args:
    mode: "min"
    factor: 0.5
    patience: 3
    cooldown: 0
    min_lr: 1.0e-8

criterion:
  name: torch.nn.CrossEntropyLoss


trainer:
  deterministic: True
  epochs: 64
  save_frequency: 4